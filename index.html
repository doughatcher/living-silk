<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Living Silk — Nalli fabric rendering study</title>
<meta name="description" content="Turn a flat Nalli saree photo into physically lit, draping silk you can spin. Rendered from the real product image, not generated." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@500;600;700&family=Assistant:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --nalli:#8c1c24; --nalli-2:#a8323b; --ink:#211d1b; --muted:#7a7268;
    --line:#e4ded3; --paper:#f4f1ea; --card:#ffffff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Assistant",system-ui,sans-serif; color:var(--ink);
    background:radial-gradient(135% 105% at 50% -5%, #fcfbf8 0%, #efeae1 58%, #e4ddd2 100%);
    overflow:hidden; -webkit-text-size-adjust:100%;
  }
  #stage{position:fixed;inset:0}
  canvas{display:block;touch-action:none}
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:2;
    background:radial-gradient(120% 80% at 50% 42%, transparent 60%, rgba(120,108,92,.14) 100%)}

  header{
    position:fixed;left:0;right:0;top:0;z-index:5;
    display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:14px 16px 22px; pointer-events:none;
    background:linear-gradient(to bottom, rgba(252,251,248,.92), rgba(252,251,248,0));
  }
  header img{height:42px;width:auto}
  header .tag{font-size:.66rem;color:var(--muted);letter-spacing:.34em;text-transform:uppercase;margin-top:2px}

  .urlbar{
    position:fixed;z-index:6;left:50%;transform:translateX(-50%);top:78px;
    display:flex;gap:0;width:min(600px,92vw);
    background:var(--card);border:1px solid var(--line);border-radius:3px;
    box-shadow:0 6px 22px rgba(60,50,40,.10);overflow:hidden;
  }
  .urlbar input{
    flex:1;min-width:0;background:transparent;border:0;outline:0;color:var(--ink);
    font-family:inherit;font-size:.92rem;padding:11px 13px;
  }
  .urlbar input::placeholder{color:#a59d92}
  .urlbar button{
    border:0;background:var(--nalli);color:#fff;font-family:"Libre Franklin",sans-serif;
    font-weight:600;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;
    padding:0 18px;cursor:pointer;transition:.15s;
  }
  .urlbar button:hover{background:var(--nalli-2)}

  #caption{position:fixed;z-index:5;left:50%;transform:translateX(-50%);bottom:132px;text-align:center;width:92vw;pointer-events:none}
  #caption .title{font-family:"Libre Franklin",sans-serif;font-weight:600;font-size:1.08rem;color:var(--ink);text-shadow:0 1px 10px rgba(250,248,244,.9),0 1px 3px rgba(250,248,244,1)}
  #caption .note{font-size:.72rem;color:var(--muted);margin-top:2px;letter-spacing:.01em;text-shadow:0 1px 8px rgba(250,248,244,.95)}

  .dock{
    position:fixed;z-index:6;left:50%;transform:translateX(-50%);bottom:20px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;max-width:96vw;
    background:var(--card);border:1px solid var(--line);border-radius:6px;
    box-shadow:0 6px 22px rgba(60,50,40,.10);padding:8px 10px;
  }
  .rail{display:flex;gap:8px;overflow-x:auto;max-width:min(78vw,420px)}
  .rail img{height:50px;width:36px;object-fit:cover;border-radius:2px;cursor:pointer;border:2px solid transparent;opacity:.72;transition:.15s;flex:0 0 auto}
  .rail img:hover{opacity:1}
  .rail img.active{border-color:var(--nalli);opacity:1}
  .dock .sep{width:1px;align-self:stretch;background:var(--line)}
  #compare{
    background:transparent;border:1px solid var(--nalli);color:var(--nalli);
    font-family:"Libre Franklin",sans-serif;font-weight:600;font-size:.66rem;letter-spacing:.09em;text-transform:uppercase;
    padding:8px 13px;border-radius:3px;cursor:pointer;transition:.15s;white-space:nowrap;flex:0 0 auto;
  }
  #compare:hover,#compare.on{background:var(--nalli);color:#fff}

  #gear{
    position:fixed;z-index:7;right:16px;top:78px;width:40px;height:40px;border-radius:3px;
    background:var(--card);border:1px solid var(--line);color:var(--nalli);font-size:1.05rem;cursor:pointer;
    display:grid;place-items:center;box-shadow:0 6px 22px rgba(60,50,40,.10);
  }
  .panel{
    position:fixed;z-index:7;right:16px;top:128px;width:min(264px,86vw);
    background:var(--card);border:1px solid var(--line);border-radius:6px;
    box-shadow:0 10px 30px rgba(60,50,40,.14);padding:14px 16px;display:none;
  }
  .panel.open{display:block}
  .panel h3{margin:.1rem 0 .7rem;font-family:"Libre Franklin",sans-serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:10px 0}
  .row label{font-size:.84rem;color:var(--ink)}
  .row input[type=range]{flex:1;accent-color:var(--nalli)}
  .row input[type=color]{width:30px;height:22px;border:1px solid var(--line);background:none;border-radius:3px;padding:0}
  .row .val{font-size:.7rem;color:var(--muted);width:30px;text-align:right}
  .panel .switchrow{display:flex;gap:8px;align-items:center;margin-top:8px}
  .panel .switchrow input{accent-color:var(--nalli)}
  .panel .switchrow label{font-size:.84rem}

  #toast{position:fixed;z-index:9;left:50%;top:128px;transform:translateX(-50%);background:#fff;border:1px solid var(--line);color:var(--ink);padding:9px 14px;border-radius:3px;font-size:.85rem;display:none;max-width:90vw;text-align:center;box-shadow:0 6px 22px rgba(60,50,40,.12)}
  #loading{position:fixed;z-index:8;inset:0;display:grid;place-items:center;pointer-events:none}
  #loading span{color:var(--nalli);font-family:"Libre Franklin",sans-serif;font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;opacity:0;transition:.2s}
  #loading.on span{opacity:.8}

  @media (max-width:560px){
    .urlbar{top:70px}
    #caption{bottom:150px}
    .panel{width:min(220px,76vw)}
  }
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="vignette"></div>

  <header>
    <img src="./assets/brand/nalli-logo.webp" alt="Nalli Silk Sarees" />
    <span class="tag">Living Silk — a fabric rendering study</span>
  </header>

  <form class="urlbar" id="urlform" autocomplete="off">
    <input id="urlinput" type="text" placeholder="Paste a nalli.com product link (or any image URL)…" />
    <button type="submit">Render</button>
  </form>

  <div id="toast"></div>
  <div id="loading"><span>rendering silk…</span></div>

  <div id="caption">
    <div class="title" id="capTitle">Yellow Kanjivaram Silk Saree</div>
    <div class="note">Rendered from the real product photo — not AI-generated. Drag to spin.</div>
  </div>

  <div class="dock">
    <div class="rail" id="rail"></div>
    <div class="sep"></div>
    <button id="compare">Compare to original photo</button>
  </div>

  <button id="gear" title="Material controls">⚙</button>
  <div class="panel open" id="panel">
    <h3>Material</h3>
    <div class="row"><label>Silk sheen</label><input id="cSheen" type="range" min="0" max="1" step="0.01"><span class="val" id="vSheen"></span></div>
    <div class="row"><label>Zari glow</label><input id="cMetal" type="range" min="0" max="1" step="0.01"><span class="val" id="vMetal"></span></div>
    <div class="row"><label>Dual‑tone</label><input id="cShot" type="range" min="0" max="1" step="0.01"><span class="val" id="vShot"></span></div>
    <div class="row"><label>Shimmer hue</label><input id="cShotColor" type="color"></div>
    <div class="row"><label>Drape</label><input id="cDrape" type="range" min="0" max="1" step="0.01"><span class="val" id="vDrape"></span></div>
    <div class="row"><label>Light sweep</label><input id="cLight" type="range" min="0" max="1" step="0.01"><span class="val" id="vLight"></span></div>
    <div class="switchrow"><input id="cSpin" type="checkbox"><label for="cSpin">Auto‑spin</label></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./app.js"></script>
</body>
</html>
